name: node_build_and_deploy

env: 
    MY_VAR: aurélien

# trigger
on: 
    # push: { branches: [main] }
    workflow_dispatch:
    
jobs: 
    build:
        runs-on: ubuntu-latest
        steps: 
            - name: checkout
              uses: actions/checkout@v6
            - name: setup node
              uses: actions/setup-node@v6
              with:
                node-version: 24.x
            - name: install
              run: npm ci
            - name: build
              run: npm run build
            - name: upload artifact
              uses: actions/upload-artifact@v7
              with:
                path: dist
                name: build
    # check_artifact:
    #     needs: build
    #     runs-on: ubuntu-slim
    #     steps: 
    #         - name: download artifact
    #           uses: actions/download-artifact@v8
    #           with:
    #             path: api
    #             name: build
    #         - name: check
    #           run: ls -a -l api
    deploy:
        # needs: check_artifact
        needs: build
        runs-on: ubuntu-slim
        steps: 
            - name: download artifact
              uses: actions/download-artifact@v8
              with:
                path: api
                name: build
            - name: deploy
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                server: ftp-khunly.alwaysdata.net
                port: 21
                username: khunly
                password: ${{ secrets.FTP_PASSWORD }}
                local-dir: api/
                server-dir: /home/khunly/
        